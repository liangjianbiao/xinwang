<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九型人格测试</title>
    <link rel="stylesheet" href="style.css">
    <script>
    var _hmt = _hmt || [];
    (function() {
      var hm = document.createElement("script");
      hm.src = "https://hm.baidu.com/hm.js?5cdc3263b8b8f94e1d69ded1cf092419";
      var s = document.getElementsByTagName("script")[0];
      s.parentNode.insertBefore(hm, s);
    })();
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>九型人格测试</h1>
            <p>探索你的性格类型</p>
        </header>

        <!-- 欢迎页面 -->
        <div id="welcome-page" class="page active">
            <div class="welcome-content">
                <div class="personality-grid">
                    <div class="personality-item" data-type="1">
                        <div class="personality-circle">1</div>
                        <span>完美主义者</span>
                    </div>
                    <div class="personality-item" data-type="2">
                        <div class="personality-circle">2</div>
                        <span>助人者</span>
                    </div>
                    <div class="personality-item" data-type="3">
                        <div class="personality-circle">3</div>
                        <span>成就者</span>
                    </div>
                    <div class="personality-item" data-type="4">
                        <div class="personality-circle">4</div>
                        <span>艺术型</span>
                    </div>
                    <div class="personality-item" data-type="5">
                        <div class="personality-circle">5</div>
                        <span>智慧型</span>
                    </div>
                    <div class="personality-item" data-type="6">
                        <div class="personality-circle">6</div>
                        <span>忠诚型</span>
                    </div>
                    <div class="personality-item" data-type="7">
                        <div class="personality-circle">7</div>
                        <span>活跃型</span>
                    </div>
                    <div class="personality-item" data-type="8">
                        <div class="personality-circle">8</div>
                        <span>领袖型</span>
                    </div>
                    <div class="personality-item" data-type="9">
                        <div class="personality-circle">9</div>
                        <span>和平型</span>
                    </div>
                </div>
                <h2>欢迎来到九型人格测试</h2>
                <p>九型人格是一种深入了解自我的工具，通过测试可以帮助你更好地认识自己的性格特点和行为模式。</p>
                <div class="version-select">
                    <h3>选择测试版本</h3>
                    <button id="btn-normal" class="btn btn-primary">普通版 (16题)</button>
                    <button id="btn-pro" class="btn btn-secondary">专业版 (90题)</button>
                </div>
            </div>
        </div>

        <!-- 测试页面 -->
        <div id="test-page" class="page">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="test-header">
                <span class="question-count">第 <span id="current-question">1</span> / <span id="total-questions">16</span> 题</span>
            </div>
            <div class="question-container">
                <h3 id="question-text">问题内容</h3>
                <div class="options-container" id="options-container"></div>
            </div>
            <div class="test-controls">
                <button id="btn-prev" class="btn btn-outline" disabled>上一题</button>
                <button id="btn-next" class="btn btn-primary">下一题</button>
                <button id="btn-submit" class="btn btn-success" style="display: none;">提交测试</button>
            </div>
        </div>

        <!-- 结果页面 -->
        <div id="result-page" class="page">
            <div class="result-content">
                <h2>你的测试结果</h2>
                <div class="type-result" id="type-result"></div>
                <div class="type-description" id="type-description"></div>
                <div class="score-details" id="score-details"></div>
                <button id="btn-restart" class="btn btn-primary">重新测试</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
