<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>决战陈塘关 - 哪吒寻兵器</title>
    <link rel="stylesheet" href="style.css">
    <script>
    var _hmt = _hmt || [];
    (function() {
      var hm = document.createElement("script");
      hm.src = "https://hm.baidu.com/hm.js?5cdc3263b8b8f94e1d69ded1cf092419";
      var s = document.getElementsByTagName("script")[0];
      s.parentNode.insertBefore(hm, s);
    })();
    </script>
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="header-left">
                <span class="game-title">⚔️ 决战陈塘关 ⚔️</span>
            </div>
            <div class="header-center">
                <span class="level-info">第 <span id="current-level">1</span> / 10 关</span>
            </div>
            <div class="header-right">
                <button id="btn-restart" class="btn btn-secondary">重新开始</button>
            </div>
        </header>

        <main class="game-main">
            <div class="level-info-panel">
                <div class="direction-hints">
                    <div class="hints-title">📍 路线提示（按数字顺序）</div>
                    <div class="hints-grid" id="hints-grid"></div>
                </div>
            </div>

            <div class="game-board">
                <canvas id="game-canvas"></canvas>
            </div>

            <div class="game-info">
                <div class="info-row">
                    <span class="info-label">起点</span>
                    <span class="info-value">哪吒 🧒</span>
                </div>
                <div class="info-row">
                    <span class="info-label">终点</span>
                    <span class="info-value">兵器 🔪</span>
                </div>
                <div class="info-row">
                    <span class="info-label">操作</span>
                    <span class="info-value">点击圆点依次连接</span>
                </div>
            </div>
        </main>

        <div class="game-controls">
            <button id="btn-undo" class="btn btn-outline">撤销一步</button>
            <button id="btn-reset" class="btn btn-outline">重置当前关</button>
            <button id="btn-hint" class="btn btn-primary">查看提示</button>
        </div>

        <div class="message-overlay" id="message-overlay">
            <div class="message-content">
                <div class="message-icon" id="message-icon">🎉</div>
                <div class="message-title" id="message-title">恭喜过关！</div>
                <div class="message-text" id="message-text">太棒了！哪吒找到了兵器！</div>
                <button id="btn-next" class="btn btn-primary">下一关 →</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
